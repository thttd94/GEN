<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static IP/MAC Tool</title>
  <style>
    body { font-family: Arial, sans-serif; background:#eef2f7; color:#111827; margin:0; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
    .card { background:#fff; border:1px solid #dbe3ee; border-radius:16px; overflow:hidden; }
    .head { padding:16px 18px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
    .title { font-size:24px; font-weight:800; }
    .sub { color:#6b7280; font-size:13px; }
    .body { padding:18px; display:grid; gap:12px; }
    textarea { width:100%; min-height:420px; box-sizing:border-box; border:1px solid #d1d5db; border-radius:12px; padding:12px; font-size:14px; resize:vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn { border:1px solid #d1d5db; background:#fff; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:700; }
    .btn.apply { background:#16a34a; color:#fff; border-color:#16a34a; }
    .btn.warn { background:#f59e0b; color:#fff; border-color:#f59e0b; }
    .status { padding:12px 14px; border-top:1px solid #e5e7eb; background:#f8fafc; font-size:14px; color:#1d4ed8; font-weight:700; white-space:pre-wrap; }
    .example { background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <div class="title">Static IP/MAC Tool</div>
          <div class="sub">Port 19123 · nhập dạng <b>IP MAC</b> · chấp nhận khoảng trắng hoặc dấu <b>|</b> hoặc <b>;</b></div>
        </div>
        <div class="sub" id="countInfo">0 dòng</div>
      </div>
      <div class="body">
        <div class="example">Ví dụ hợp lệ:<br><b>192.15.4.1 22:BE:61:3E:26:CF</b><br><b>192.15.4.2|AA:BB:CC:DD:EE:FF</b><br><b>192.15.4.3;11:22:33:44:55:66</b></div>
        <textarea id="mappingText" spellcheck="false" placeholder="192.15.4.1 22:BE:61:3E:26:CF"></textarea>
        <div class="actions">
          <button class="btn" onclick="loadData()">Reload</button>
          <button class="btn apply" onclick="applyAll()">Apply</button>
          <button class="btn warn" onclick="rebootRouter()">Reboot</button>
        </div>
      </div>
      <div class="status" id="status">Ready</div>
    </div>
  </div>

  <script>
    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    async function fetchJSON(url, options={}) {
      const res = await fetch(url, { headers: {'Content-Type':'application/json'}, ...options });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }
    function updateCount() {
      const lines = document.getElementById('mappingText').value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      document.getElementById('countInfo').textContent = `${lines.length} dòng`;
    }
    async function loadData() {
      try {
        setStatus('Đang nạp danh sách hiện tại...');
        const data = await fetchJSON('/api/mappings');
        document.getElementById('mappingText').value = data.text || '';
        updateCount();
        setStatus(`Đã nạp ${data.count || 0} dòng`);
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }
    async function applyAll() {
      try {
        const text = document.getElementById('mappingText').value;
        if (!text.trim()) return setStatus('Chưa có dữ liệu để apply');
        setStatus('Đang apply danh sách IP/MAC...');
        const data = await fetchJSON('/api/apply', { method:'POST', body: JSON.stringify({ text }) });
        updateCount();
        setStatus(`Đã apply ${data.count || 0} dòng`);
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }
    async function rebootRouter() {
      try {
        setStatus('Đang gửi lệnh reboot...');
        await fetchJSON('/api/reboot', { method:'POST', body:'{}' });
        setStatus('Đã gửi lệnh reboot');
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }
    document.getElementById('mappingText').addEventListener('input', updateCount);
    loadData();
  </script>
</body>
</html>
