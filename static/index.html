<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genrouter Proxy Manager _ By Hồng Thái</title>
  <style>
    body { font-family: Arial, sans-serif; background:#eef2f7; color:#111827; margin:0; }
    .wrap { max-width: 1780px; margin: 0 auto; padding: 14px; }
    .titlebar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .title { font-size:26px; font-weight:800; }
    .brand { font-size:14px; font-weight:700; color:#2563eb; }
    .toolbar { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap; margin-bottom:10px; }
    .toolbar-left,.toolbar-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .btn { border:1px solid #d1d5db; background:#fff; padding:9px 13px; border-radius:10px; cursor:pointer; font-weight:700; }
    .btn.tab.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .btn.apply { background:#16a34a; color:#fff; border-color:#16a34a; }
    .btn.warn { background:#f59e0b; color:#fff; border-color:#f59e0b; }
    .btn.small { padding:6px 10px; font-size:12px; }
    .status { font-size:13px; color:#2563eb; font-weight:700; margin-left:6px; }
    .panel { background:#fff; border:1px solid #dbe3ee; border-radius:14px; overflow:hidden; }
    .meta { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-bottom:1px solid #e5e7eb; background:#fff; }
    .notes-wrap { padding:12px 14px; border-bottom:1px solid #e5e7eb; background:#fff; }
    .notes-summary-box { border:1px solid #d1d5db; border-radius:10px; background:#fff; min-height:105px; max-height:165px; overflow:auto; padding:10px 12px; white-space:pre-wrap; font-size:14px; line-height:1.45; }
    .notes-summary-empty { color:#9ca3af; }
    .bulkbar { display:grid; grid-template-columns: 370px 1fr auto; gap:10px; padding:12px 14px; border-bottom:1px solid #e5e7eb; background:#f8fafc; }
    .bulk-actions { display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; }
    .sub { color:#6b7280; font-size:12px; margin-top:5px; }
    .grid { max-height:76vh; overflow:auto; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 8px; border-bottom:1px solid #edf2f7; font-size:14px; vertical-align:middle; }
    th { text-align:left; background:#f8fafc; position:sticky; top:0; z-index:1; }
    input, textarea { width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:8px; padding:8px 10px; font-size:14px; }
    textarea { min-height:90px; resize:vertical; }
    .badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .online { background:#dcfce7; color:#166534; }
    .offline { background:#fee2e2; color:#991b1b; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .proxy-cell { min-width:420px; }
    .note-cell { min-width:220px; }
    .check-ok { color:#15803d; font-weight:800; }
    .check-bad { color:#b91c1c; font-weight:800; }
    .check-wait { color:#2563eb; font-weight:700; }
    .th-check { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal.show { display:flex; }
    .modal-card { width:min(520px, 92vw); background:#fff; border-radius:16px; border:1px solid #e5e7eb; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal-head { display:flex; justify-content:space-between; align-items:center; padding:16px 18px; border-bottom:1px solid #e5e7eb; }
    .modal-body { padding:16px 18px; display:grid; gap:12px; }
    .modal-foot { padding:16px 18px; border-top:1px solid #e5e7eb; display:flex; justify-content:flex-end; gap:10px; }
    .field label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="titlebar">
      <div class="title">Genrouter Proxy Manager _ By Hồng Thái</div>
      <div class="brand">Hồng Thái</div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn tab active" id="tab1" onclick="switchSession('1')">Session 1</button>
        <button class="btn tab" id="tab2" onclick="switchSession('2')">Session 2</button>
        <button class="btn" onclick="saveCurrent()">Save</button>
        <button class="btn apply" onclick="applySession('1')">Apply SS1</button>
        <button class="btn apply" onclick="applySession('2')">Apply SS2</button>
        <button class="btn" onclick="clone1to2()">Clone SS1 → SS2</button>
        <span class="status" id="status">Ready</span>
      </div>
      <div class="toolbar-right">
        <button class="btn warn" onclick="rebootRouter()">Reboot Router</button>
        <button class="btn warn" onclick="openSetupRouter()">Set up Router</button>
      </div>
    </div>

    <div class="panel">
      <div class="meta">
        <div><b id="sessionLabel">Session 1</b></div>
        <div class="sub" id="countLabel">0 rows</div>
      </div>

      <div class="notes-wrap">
        <div class="notes-summary-box" id="notesSummary"></div>
      </div>

      <div class="bulkbar">
        <div>
          <input id="bulkProxy" placeholder="1 proxy cho tất cả: server:port:user:pass">
          <div class="sub">Gán toàn bộ thiết bị của session đang mở</div>
        </div>
        <div>
          <textarea id="bulkMap" placeholder="225|1.2.3.4:1080:user:pass
225;1.2.3.4:1080:user:pass
225 1.2.3.4:1080:user:pass"></textarea>
          <div class="sub">x = số tag. Ví dụ 225 = proxy_225. Chỉ đổi các dòng có trong danh sách nhập.</div>
        </div>
        <div class="bulk-actions">
          <button class="btn" onclick="assignAllProxy()">1 Proxy All</button>
          <button class="btn" onclick="clearAllProxy()">Clear Proxy</button>
          <button class="btn" onclick="clearAllNotes()">Clear Notes</button>
          <button class="btn" onclick="applyBulkMap()">Bulk Assign</button>
        </div>
      </div>

      <div class="grid">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">#</th>
              <th style="width:170px;">MAC</th>
              <th style="width:135px;">IP</th>
              <th style="width:95px;">Status</th>
              <th style="width:120px;">Proxy Tag</th>
              <th class="proxy-cell">Proxy</th>
              <th class="note-cell">Note</th>
              <th style="width:190px;">
                <div class="th-check">
                  <span>Check Proxy</span>
                  <button class="btn small warn" onclick="checkAllProxy()">Check All</button>
                </div>
              </th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="routerModal">
    <div class="modal-card">
      <div class="modal-head">
        <b>Set up Router</b>
        <button class="btn small" onclick="closeRouterModal()">Đóng</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>LAN IP</label>
          <input id="routerIp" placeholder="192.168.1.1">
        </div>
        <div class="sub" id="routerInfo">Chỉ sửa LAN IP của router</div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeRouterModal()">Hủy</button>
        <button class="btn apply" onclick="submitRouterSetup()">Lưu LAN IP</button>
      </div>
    </div>
  </div>

  <script>
    let currentSession = '1';
    let currentRows = [];

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    async function fetchJSON(url, options={}) {
      const res = await fetch(url, { headers: {'Content-Type':'application/json'}, ...options });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }
    function esc(v) { return String(v || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;'); }

    function renderNotesSummary() {
      const box = document.getElementById('notesSummary');
      const lines = currentRows.filter(r => String(r.note || '').trim()).map(r => `${r.ip} | ${r.tag} | ${r.note.trim()}`);
      if (!lines.length) {
        box.innerHTML = '<span class="notes-summary-empty">Chưa có note</span>';
        return;
      }
      box.textContent = lines.join('\n');
    }

    function render() {
      document.getElementById('tab1').classList.toggle('active', currentSession === '1');
      document.getElementById('tab2').classList.toggle('active', currentSession === '2');
      document.getElementById('sessionLabel').textContent = currentSession === '1' ? 'Session 1' : 'Session 2';
      document.getElementById('countLabel').textContent = `${currentRows.length} rows`;
      document.getElementById('rows').innerHTML = currentRows.map((row, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td class="mono">${esc(row.mac || '')}</td>
          <td class="mono">${esc(row.ip)}</td>
          <td><span class="badge ${row.status === 'online' ? 'online' : 'offline'}">${esc(row.status || 'offline')}</span></td>
          <td class="mono">${esc(row.tag)}</td>
          <td><input value="${esc(row.proxy || '')}" data-tag="${esc(row.tag)}" data-field="proxy" oninput="updateField(this)" placeholder="server:port:user:pass"></td>
          <td><input value="${esc(row.note || '')}" data-tag="${esc(row.tag)}" data-field="note" oninput="updateField(this)" placeholder="Ghi chú cho IP này"></td>
          <td><button class="btn small" onclick="checkProxy('${esc(row.tag)}')">Check</button><div id="check-${esc(row.tag)}" class="sub"></div></td>
        </tr>`).join('');
      renderNotesSummary();
    }

    function updateField(el) {
      const row = currentRows.find(r => r.tag === el.dataset.tag);
      if (row) row[el.dataset.field] = el.value;
      if (el.dataset.field === 'note') renderNotesSummary();
    }

    function assignAllProxy() {
      const value = document.getElementById('bulkProxy').value.trim();
      currentRows.forEach(r => r.proxy = value);
      render();
      setStatus('Đã gán 1 proxy cho toàn bộ session ' + currentSession);
    }

    function clearAllProxy() {
      currentRows.forEach(r => r.proxy = '');
      render();
      setStatus('Đã xóa toàn bộ proxy của session ' + currentSession);
    }

    function clearAllNotes() {
      currentRows.forEach(r => r.note = '');
      renderNotesSummary();
      render();
      setStatus('Đã xóa toàn bộ note của session ' + currentSession);
    }

    function parseBulkLine(line) {
      let m = line.match(/^\s*(\d+)\s*[|;]\s*(.+)\s*$/);
      if (m) return { x: m[1], proxy: m[2] };
      m = line.match(/^\s*(\d+)\s+(.+)\s*$/);
      if (m) return { x: m[1], proxy: m[2] };
      return null;
    }

    function applyBulkMap() {
      const text = document.getElementById('bulkMap').value.trim();
      if (!text) return setStatus('Chưa nhập danh sách gán hàng loạt');
      const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      let changed = 0;
      for (const line of lines) {
        const item = parseBulkLine(line);
        if (!item) continue;
        const tag = `proxy_${item.x}`;
        const row = currentRows.find(r => r.tag === tag);
        if (!row) continue;
        row.proxy = item.proxy.trim();
        changed++;
      }
      render();
      setStatus(`Đã gán hàng loạt ${changed} dòng theo danh sách nhập`);
    }

    async function checkProxy(tag) {
      const row = currentRows.find(r => r.tag === tag);
      const box = document.getElementById(`check-${tag}`);
      if (!row || !box) return;
      box.className = 'check-wait';
      box.textContent = 'CHECK...';
      try {
        const data = await fetchJSON('/api/pm/check-proxy', { method:'POST', body: JSON.stringify({ proxy: row.proxy || '' }) });
        box.className = data.ok ? 'check-ok' : 'check-bad';
        box.textContent = data.ok ? 'LIVE' : 'DEAD';
      } catch {
        box.className = 'check-bad';
        box.textContent = 'DEAD';
      }
    }

    async function checkAllProxy() {
      setStatus('Đang check toàn bộ proxy...');
      await Promise.all(currentRows.map(row => checkProxy(row.tag)));
      setStatus('Đã check xong session ' + currentSession);
    }

    async function rebootRouter() {
      try {
        setStatus('Đang reboot router...');
        await fetchJSON('/api/pm/reboot-router', { method:'POST', body:'{}' });
        setStatus('Đã gửi lệnh reboot router');
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }

    async function openSetupRouter() {
      try {
        setStatus('Đang lấy IP router...');
        const info = await fetchJSON('/api/pm/router-info');
        const ip = info?.data?.data?.lan?.networks?.[0]?.ip || info?.data?.lan?.networks?.[0]?.ip || window.location.hostname || '';
        document.getElementById('routerIp').value = ip;
        document.getElementById('routerModal').classList.add('show');
        setStatus('Đã mở Set up Router');
      } catch {
        document.getElementById('routerIp').value = window.location.hostname || '';
        document.getElementById('routerModal').classList.add('show');
        setStatus('Đã mở Set up Router');
      }
    }

    function closeRouterModal() {
      document.getElementById('routerModal').classList.remove('show');
    }

    async function submitRouterSetup() {
      try {
        const payload = { ip_lan: document.getElementById('routerIp').value.trim() };
        setStatus('Đang lưu LAN IP router...');
        await fetchJSON('/api/pm/router-change-lan', { method:'POST', body: JSON.stringify(payload) });
        closeRouterModal();
        setStatus('Đã gửi cấu hình đổi LAN IP router');
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }

    async function loadSession(session) {
      setStatus('Loading session ' + session + '...');
      const data = await fetchJSON(`/api/pm/sessions/${session}`);
      currentSession = session;
      currentRows = data.rows || [];
      render();
      setStatus('Loaded session ' + session);
    }

    async function switchSession(session) {
      try { await loadSession(session); } catch (e) { setStatus('Lỗi: ' + e.message); }
    }

    async function saveCurrent() {
      try {
        setStatus('Saving session ' + currentSession + '...');
        await fetchJSON(`/api/pm/sessions/${currentSession}`, { method:'POST', body: JSON.stringify({ rows: currentRows }) });
        setStatus('Saved session ' + currentSession);
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }

    async function applySession(session) {
      try {
        if (currentSession === session) await saveCurrent();
        setStatus('Applying session ' + session + '...');
        await fetchJSON(`/api/pm/apply/${session}`, { method:'POST' });
        setStatus('Đã apply session ' + session);
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }

    async function clone1to2() {
      try {
        setStatus('Cloning SS1 -> SS2...');
        await fetchJSON('/api/pm/clone/1-to-2', { method:'POST' });
        if (currentSession === '2') await loadSession('2');
        setStatus('Đã clone SS1 -> SS2');
      } catch (e) {
        setStatus('Lỗi: ' + e.message);
      }
    }

    loadSession('1');
  </script>
</body>
</html>
